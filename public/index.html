<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2048 联机竞速</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="2048 联机竞速">
      <section class="hero">
        <div>
          <p class="eyebrow">同学房间</p>
          <h1>2048 联机竞速</h1>
        </div>

        <div class="connection-pill" id="connection-status">正在连接</div>
      </section>

      <section class="room-panel" aria-label="房间">
        <div class="field">
          <label for="player-name">昵称</label>
          <input id="player-name" maxlength="14" autocomplete="nickname" placeholder="例如 小明" />
        </div>

        <div class="field room-code-field">
          <label for="room-code">房间号</label>
          <input id="room-code" maxlength="5" autocomplete="off" placeholder="ABCDE" />
        </div>

        <div class="room-actions">
          <button id="create-room-button" type="button">创建房间</button>
          <button id="join-room-button" class="secondary-button" type="button">加入房间</button>
        </div>

        <div class="active-room" id="active-room" hidden>
          <span>当前房间</span>
          <strong id="active-room-code">-----</strong>
          <button id="copy-room-button" class="ghost-button" type="button">复制</button>
        </div>
      </section>

      <section class="game-layout">
        <section class="game-panel" aria-label="自己的棋盘">
          <div class="game-topbar">
            <div>
              <p class="eyebrow">我的棋盘</p>
              <h2>2048</h2>
            </div>

            <div class="score-panel" aria-label="分数">
              <div class="score-box">
                <span>分数</span>
                <strong id="score">0</strong>
              </div>
              <div class="score-box">
                <span>最高</span>
                <strong id="best-score">0</strong>
              </div>
            </div>
          </div>

          <div class="controls">
            <p id="status-text">创建或加入房间后开始</p>
            <button id="restart-button" type="button">重新开始</button>
          </div>

          <div class="board-wrap">
            <div id="board" class="board" aria-label="2048 棋盘"></div>

            <div id="message" class="message is-hidden" role="status" aria-live="polite">
              <div class="message-panel">
                <h2 id="message-title">游戏结束</h2>
                <p id="message-copy">最终分数：0</p>
                <button id="message-button" type="button">再来一局</button>
              </div>
            </div>
          </div>
        </section>

        <aside class="leaderboard-panel" aria-label="排行榜">
          <div class="leaderboard-head">
            <div>
              <p class="eyebrow">实时排行</p>
              <h2>排行榜</h2>
            </div>
            <span id="player-count">0 人</span>
          </div>

          <ol id="players-list" class="players-list">
            <li class="empty-state">还没有进入房间</li>
          </ol>
        </aside>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
  </body>
</html>
